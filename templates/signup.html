<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="{{ url_for('static', filename='js/signup.js') }}" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  </head>
  <body>
    <div class="container"> {% with messages = get_flashed_messages() %} {% if messages %} <div class="popup" id="popup">
        <div class="popup-box">
          <h2>Log</h2>
          <p>{{ messages[0] }}</p>
          <button onclick="closePopup()">OK</button>
        </div>
      </div> {% endif %} {% endwith %} <form class="signup-box" action="/signup" method="POST">
        <h1>Create Account</h1>
        <p>Join us today!</p>
        <div class="input-box">
          <input type="text" name="fullname" placeholder="Full Name" required>
        </div>
        <div class="input-box">
          <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="input-box password-box">
          <input type="password" id="password" name="password" placeholder="Password" required>
          <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
        </div>
        <div class="input-box password-box">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
          <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
        </div>
        <button type="submit"> Sign Up </button>
        <span> Already have an account? <a href="/login">Login</a>
        </span>
      </form>
    </div>
  </body>
</html>
